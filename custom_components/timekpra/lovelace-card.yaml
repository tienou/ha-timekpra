type: vertical-stack
cards:
  # ── Status ────────────────────────────────────────────────────
  - type: entities
    title: "Parental Control - Camille"
    icon: mdi:shield-account
    entities:
      - entity: sensor.timekpra_camille_computer
        name: "Computer"
      - entity: sensor.timekpra_camille_pending_changes
        name: "Pending changes"
      - entity: sensor.timekpra_camille_time_used_today
        name: "Time used today"
      - entity: sensor.timekpra_camille_time_used_this_week
        name: "Time used this week"

  # ── Allowed days ──────────────────────────────────────────────
  - type: entities
    title: "Allowed days"
    icon: mdi:calendar
    show_header_toggle: false
    entities:
      - entity: switch.timekpra_camille_allowed_day_monday
        name: "Monday"
      - entity: switch.timekpra_camille_allowed_day_tuesday
        name: "Tuesday"
      - entity: switch.timekpra_camille_allowed_day_wednesday
        name: "Wednesday"
      - entity: switch.timekpra_camille_allowed_day_thursday
        name: "Thursday"
      - entity: switch.timekpra_camille_allowed_day_friday
        name: "Friday"
      - entity: switch.timekpra_camille_allowed_day_saturday
        name: "Saturday"
      - entity: switch.timekpra_camille_allowed_day_sunday
        name: "Sunday"

  # ── Time range ────────────────────────────────────────────────
  - type: entities
    title: "Time range"
    icon: mdi:clock-outline
    entities:
      - entity: number.timekpra_camille_start_hour
        name: "Start hour"
      - entity: number.timekpra_camille_end_hour
        name: "End hour"

  # ── Daily limits ──────────────────────────────────────────────
  - type: entities
    title: "Daily limits"
    icon: mdi:timer-outline
    entities:
      - entity: switch.timekpra_camille_daily_limits_enabled
        name: "Enable daily limits"
      - entity: number.timekpra_camille_monday_limit
        name: "Monday"
      - entity: number.timekpra_camille_tuesday_limit
        name: "Tuesday"
      - entity: number.timekpra_camille_wednesday_limit
        name: "Wednesday"
      - entity: number.timekpra_camille_thursday_limit
        name: "Thursday"
      - entity: number.timekpra_camille_friday_limit
        name: "Friday"
      - entity: number.timekpra_camille_saturday_limit
        name: "Saturday"
      - entity: number.timekpra_camille_sunday_limit
        name: "Sunday"

  # ── Global limits ─────────────────────────────────────────────
  - type: entities
    title: "Global limits"
    icon: mdi:calendar-clock
    entities:
      - entity: switch.timekpra_camille_weekly_limit_enabled
        name: "Enable weekly limit"
      - entity: number.timekpra_camille_weekly_limit
        name: "Weekly limit"
      - entity: switch.timekpra_camille_monthly_limit_enabled
        name: "Enable monthly limit"
      - entity: number.timekpra_camille_monthly_limit
        name: "Monthly limit"

  # ── Settings ──────────────────────────────────────────────────
  - type: entities
    title: "Settings"
    icon: mdi:cog
    entities:
      - entity: select.timekpra_camille_action_when_time_runs_out
        name: "Action when time runs out"
      - entity: switch.timekpra_camille_count_idle_time
        name: "Count idle time"
